<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Freetopify</title>
  <link rel="stylesheet" href="/web/css/reset.css" />
  <link rel="stylesheet" href="/web/css/variables.css" />
  <link rel="stylesheet" href="/web/css/app.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-card {
      width: 100%;
      max-width: 340px;
      padding: var(--space-3);
      background: linear-gradient(180deg, rgba(29,69,120,0.48), rgba(11,25,44,0.88));
      border: 1px solid rgba(126, 188, 255, 0.14);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 48px rgba(3, 8, 20, 0.6);
      text-align: center;
    }
    .login-card h1 {
      margin-bottom: var(--space-3);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #7ebcff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Freetopify</h1>
    <form id="login-form" class="login-form">
      <input id="username" class="text-input" placeholder="Username" required />
      <div style="position: relative; width: 100%;">
        <input id="password" class="text-input" type="password" placeholder="Password" required style="width: 100%; padding-right: 40px;" />
        <button type="button" id="toggle-pwd" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #b3cae3; font-size: 16px; padding: 4px;">👁️</button>
      </div>
      <button type="submit" class="primary-btn" style="margin-top: 8px;">Login</button>
    </form>
  </main>
  <script type="module" src="/web/js/auth.js"></script>
  <script>
    const pwd = document.getElementById('password');
    const toggle = document.getElementById('toggle-pwd');
    toggle.addEventListener('click', () => {
      if (pwd.type === 'password') {
        pwd.type = 'text';
        toggle.textContent = '🙈';
      } else {
        pwd.type = 'password';
        toggle.textContent = '👁️';
      }
    });
  </script>
</body>
</html>
