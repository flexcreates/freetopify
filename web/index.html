<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freetopify</title>
  <link rel="stylesheet" href="/web/css/reset.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web/css/variables.css" />
  <link rel="stylesheet" href="/web/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Freetopify</div>
      <nav class="side-nav">
        <a href="#library" class="side-link">Library</a>
        <a href="#player" class="side-link">Now Playing</a>
        <a href="#downloads" class="side-link">Downloads</a>
        <a href="#settings" class="side-link">Settings</a>
      </nav>
    </aside>

    <section class="content-wrap">
      <header class="content-top">
        <div style="display:flex;align-items:center;gap:12px;">
          <button id="btn-global-back" class="secondary-btn" title="Back" disabled>← Back</button>
          <div class="content-title">Your Music</div>
        </div>
      </header>
      <main id="app" class="view">Loading...</main>
    </section>

    <aside class="right-panel" id="right-panel">
      <div class="right-title">Queue</div>
      <div id="queue-list" class="queue-list">No tracks queued</div>
    </aside>
  </div>

  <footer class="now-bar" id="now-bar">
    <div class="now-meta">
      <img class="thumb-img" id="now-thumb-img" alt="" />
      <div class="thumb-fallback" id="now-thumb-fallback">♪</div>
      <div class="now-text">
        <div class="now-title" id="now-title">Nothing playing</div>
        <div class="now-sub" id="now-sub">Pick a song from Library</div>
      </div>
    </div>

    <div class="now-controls">
      <div class="control-buttons">
        <button id="btn-shuffle" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
        <button id="btn-prev" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button id="btn-play" class="ctl ctl-main"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg></button>
        <button id="btn-next" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        <button id="btn-repeat" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
      </div>
      <div class="progress-wrap">
        <span id="now-time">0:00</span>
        <input id="seek" type="range" min="0" max="100" value="0" />
        <span id="now-dur">0:00</span>
      </div>
    </div>

    <div class="volume-wrap">
      <svg viewBox="0 0 24 24" fill="#9db8d2" width="20" height="20"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input id="volume" type="range" min="0" max="100" value="80" />
    </div>
  </footer>

  <script type="module" src="/web/js/app.js"></script>
</body>
</html>
