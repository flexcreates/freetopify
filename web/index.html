<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Freetopify — Private, folder-first music player for your local network." />
  <title>Freetopify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web/css/reset.css?v=20260524-11" />
  <link rel="stylesheet" href="/web/css/variables.css?v=20260524-11" />
  <link rel="stylesheet" href="/web/css/app.css?v=20260524-11" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Freetopify</div>
      <nav class="side-nav">
        <a href="#library" class="side-link" id="nav-library">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5a2.5 2.5 0 0 1-5 0 2.5 2.5 0 0 1 2.5-2.5c.57 0 1.08.19 1.5.5V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
          Library
        </a>
        <a href="#player" class="side-link" id="nav-player">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          Now Playing
        </a>
        <a href="#downloads" class="side-link" id="nav-downloads">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Downloads
        </a>
        <a href="#settings" class="side-link" id="nav-settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          Settings
        </a>
        <a href="#about" class="side-link" id="nav-about">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          About
        </a>
      </nav>
    </aside>

    <section class="content-wrap">
      <header class="content-top">
        <div style="display:flex;align-items:center;gap:12px;">
          <button id="btn-global-back" class="secondary-btn" title="Back" disabled>← Back</button>
          <div class="content-title">Your Music</div>
        </div>
      </header>
      <main id="app" class="view">Loading...</main>
    </section>

    <aside class="right-panel" id="right-panel">
      <div class="right-title">Queue</div>
      <div id="queue-list" class="queue-list">No tracks queued</div>
    </aside>
  </div>

  <footer class="now-bar" id="now-bar">
    <div class="now-meta">
      <img class="thumb-img" id="now-thumb-img" alt="" />
      <div class="thumb-fallback" id="now-thumb-fallback">♪</div>
      <div class="now-text">
        <div class="now-title" id="now-title">Nothing playing</div>
        <div class="now-sub" id="now-sub">Pick a song from Library</div>
      </div>
    </div>

    <div class="now-controls">
      <div class="control-buttons">
        <button id="btn-shuffle" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
        <button id="btn-prev" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button id="btn-play" class="ctl ctl-main"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg></button>
        <button id="btn-next" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        <button id="btn-repeat" class="ctl"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
      </div>
      <div class="progress-wrap">
        <span id="now-time">0:00</span>
        <input id="seek" type="range" min="0" max="100" value="0" />
        <span id="now-dur">0:00</span>
      </div>
    </div>

    <div class="volume-wrap">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input id="volume" type="range" min="0" max="100" value="80" />
    </div>
  </footer>

  <script type="module" src="/web/js/app.js?v=20260524-11"></script>
</body>
</html>
