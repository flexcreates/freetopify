name: Cross-Platform Runner Smoke

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  runner-smoke:
    name: runner-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compile runner
        run: |
          python -m py_compile scripts/run_server.py
          python -m py_compile freetopify.py
          python -m py_compile freetopify_media.py

      - name: Validate shell script syntax (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/install_linux.sh
          bash -n scripts/install_macos.sh
          bash -n scripts/run_server_linux.sh
          bash -n scripts/run_server_macos.sh
          bash -n scripts/ftsmdl.sh
          bash -n scripts/organize_music_library.sh

      - name: Dry-run core runner
        run: python scripts/run_server.py --dry-run

      - name: Dry-run root launcher
        run: python freetopify.py start --dry-run

      - name: Dry-run Linux wrapper
        if: runner.os == 'Linux'
        run: bash scripts/run_server_linux.sh --dry-run

      - name: Dry-run macOS wrapper
        if: runner.os == 'macOS'
        run: bash scripts/run_server_macos.sh --dry-run

      - name: Dry-run Windows wrapper
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/run_server.ps1 --dry-run

      - name: PowerShell syntax parse checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @(
            "scripts/run_server.ps1",
            "scripts/install_windows.ps1",
            "scripts/ftsmdl.ps1",
            "scripts/organize_music_library.ps1"
          )
          foreach ($file in $files) {
            Write-Host "Parsing $file"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
          }
